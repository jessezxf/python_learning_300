<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手部动作 3D 粒子捕捉</title>
  <style>
    :root {
      --bg-top: #06131f;
      --bg-bottom: #01070c;
      --panel: rgba(6, 18, 28, 0.72);
      --line: rgba(150, 230, 255, 0.2);
      --text: #dff8ff;
      --muted: #85b9c5;
      --accent: #79f6ff;
      --warn: #ffd27d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(36, 129, 170, 0.18), transparent 30%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 3;
      width: min(360px, calc(100vw - 40px));
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
    }

    .hud h1 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: 0.04em;
    }

    .hud p {
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      color: var(--accent);
    }

    .tip {
      color: var(--warn);
    }

    video {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: min(260px, 32vw);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      opacity: 0.35;
      z-index: 2;
      transform: scaleX(-1);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.04);
    }

    @media (max-width: 768px) {
      .hud {
        top: 14px;
        left: 14px;
        padding: 14px;
      }

      .hud h1 {
        font-size: 18px;
      }

      video {
        width: min(42vw, 180px);
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <h1>手部动作 3D 粒子捕捉</h1>
      <p>粒子初始处于自由无序漂浮状态。检测到手部后，粒子会被手部轨迹吸引并沿运动趋势跟随。</p>
      <p>请允许浏览器访问摄像头，并将单只手放入画面中进行挥动、画圈或拖拽。</p>
      <p class="tip">首次打开若无反应，请等待脚本资源加载完成后再授权摄像头。</p>
      <div class="status" id="status">状态：正在初始化…</div>
    </div>
    <video id="video" playsinline muted></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");

    const app = {
      handDetected: false,
      handConfidence: 0,
      lastSeenAt: 0,
      trail: [],
      latestPoint: new THREE.Vector3(),
      latestVelocity: new THREE.Vector3(),
      tmpVec: new THREE.Vector3(),
      centerPull: 0.012
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("app").appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x031018, 0.03);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 14);

    const ambient = new THREE.AmbientLight(0x88ccff, 1.4);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0x7df3ff, 3.5, 40, 2);
    pointLight.position.set(0, 0, 8);
    scene.add(pointLight);

    const particleCount = 2400;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);
    const velocities = [];
    const particleTargets = [];
    const anchorSeeds = [];

    const colorA = new THREE.Color("#79f6ff");
    const colorB = new THREE.Color("#58a6ff");
    const colorMix = new THREE.Color();

    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3;
      positions[i3] = (Math.random() - 0.5) * 22;
      positions[i3 + 1] = (Math.random() - 0.5) * 12;
      positions[i3 + 2] = (Math.random() - 0.5) * 12;

      velocities.push(new THREE.Vector3(
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04
      ));

      particleTargets.push(new THREE.Vector3());
      anchorSeeds.push({
        phase: Math.random() * Math.PI * 2,
        radius: 0.2 + Math.random() * 1.2,
        lift: (Math.random() - 0.5) * 2.0,
        depth: (Math.random() - 0.5) * 2.4,
        drag: 0.86 + Math.random() * 0.1
      });

      colorMix.copy(colorA).lerp(colorB, Math.random() * 0.8);
      colors[i3] = colorMix.r;
      colors[i3 + 1] = colorMix.g;
      colors[i3 + 2] = colorMix.b;
      sizes[i] = 0.05 + Math.random() * 0.06;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    const trailGeometry = new THREE.BufferGeometry();
    const maxTrailPoints = 120;
    const trailPositions = new Float32Array(maxTrailPoints * 3);
    trailGeometry.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
    trailGeometry.setDrawRange(0, 0);

    const trailMaterial = new THREE.LineBasicMaterial({
      color: 0x95fbff,
      transparent: true,
      opacity: 0.75
    });

    const trailLine = new THREE.Line(trailGeometry, trailMaterial);
    scene.add(trailLine);

    const clock = new THREE.Clock();

    function setStatus(text) {
      statusEl.textContent = "状态：" + text;
    }

    function updateTrailLine() {
      const drawCount = Math.min(app.trail.length, maxTrailPoints);
      for (let i = 0; i < drawCount; i++) {
        const point = app.trail[app.trail.length - 1 - i];
        trailPositions[i * 3] = point.x;
        trailPositions[i * 3 + 1] = point.y;
        trailPositions[i * 3 + 2] = point.z;
      }
      trailGeometry.setDrawRange(0, drawCount);
      trailGeometry.attributes.position.needsUpdate = true;
    }

    function mapHandToScene(x, y, z) {
      const mappedX = (0.5 - x) * 12;
      const mappedY = (0.5 - y) * 8;
      const mappedZ = (0.5 - z) * 10;
      return new THREE.Vector3(mappedX, mappedY, mappedZ);
    }

    function updateHandState(multiHandLandmarks) {
      if (!multiHandLandmarks || !multiHandLandmarks.length) {
        app.handConfidence = Math.max(0, app.handConfidence - 0.08);
        if (performance.now() - app.lastSeenAt > 500) {
          app.handDetected = false;
        }
        return;
      }

      const landmarks = multiHandLandmarks[0];
      const wrist = landmarks[0];
      const middleKnuckle = landmarks[9];

      const centerX = (wrist.x + middleKnuckle.x) * 0.5;
      const centerY = (wrist.y + middleKnuckle.y) * 0.5;
      const centerZ = (wrist.z + middleKnuckle.z) * 0.5;
      const point = mapHandToScene(centerX, centerY, centerZ);

      app.latestVelocity.copy(point).sub(app.latestPoint).multiplyScalar(0.65);
      app.latestPoint.copy(point);
      app.handDetected = true;
      app.handConfidence = Math.min(1, app.handConfidence + 0.12);
      app.lastSeenAt = performance.now();

      app.trail.push(point.clone());
      if (app.trail.length > maxTrailPoints) {
        app.trail.shift();
      }

      updateTrailLine();
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      updateHandState(results.multiHandLandmarks);
    });

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 960, height: 540, facingMode: "user" },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const cameraFeed = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 960,
          height: 540
        });

        cameraFeed.start();
        setStatus("摄像头已连接，等待检测手部…");
      } catch (error) {
        console.error(error);
        setStatus("摄像头启动失败，请检查浏览器权限或网络资源加载。");
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      const detectedRecently = app.handDetected && performance.now() - app.lastSeenAt < 220;
      const positionsArray = geometry.attributes.position.array;

      pointLight.position.x = Math.sin(elapsed * 0.7) * 2.5;
      pointLight.position.y = Math.cos(elapsed * 0.4) * 1.6;

      if (detectedRecently) {
        setStatus("已检测到手部，粒子正在跟随轨迹运动。");
      } else {
        setStatus("未检测到手部，粒子保持自由无序状态。");
      }

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        const vx = velocities[i];
        const target = particleTargets[i];
        const seed = anchorSeeds[i];

        if (detectedRecently && app.trail.length > 1) {
          const trailIndex = Math.max(0, app.trail.length - 1 - (i % app.trail.length));
          target.copy(app.trail[trailIndex]);

          const swirl = elapsed * 1.6 + seed.phase + i * 0.013;
          target.x += Math.cos(swirl) * seed.radius;
          target.y += Math.sin(swirl * 1.2) * (seed.radius * 0.6) + seed.lift * 0.2;
          target.z += Math.sin(swirl * 0.8) * 0.8 + seed.depth * 0.25;
          target.addScaledVector(app.latestVelocity, 5.5);

          app.tmpVec.set(
            target.x - positionsArray[i3],
            target.y - positionsArray[i3 + 1],
            target.z - positionsArray[i3 + 2]
          );

          vx.addScaledVector(app.tmpVec, 0.010 + app.handConfidence * 0.028);
          vx.multiplyScalar(seed.drag);
        } else {
          vx.x += (Math.random() - 0.5) * 0.0025;
          vx.y += (Math.random() - 0.5) * 0.0025;
          vx.z += (Math.random() - 0.5) * 0.0025;

          app.tmpVec.set(-positionsArray[i3], -positionsArray[i3 + 1], -positionsArray[i3 + 2]);
          vx.addScaledVector(app.tmpVec, app.centerPull * 0.02);
          vx.multiplyScalar(0.992);
        }

        positionsArray[i3] += vx.x;
        positionsArray[i3 + 1] += vx.y;
        positionsArray[i3 + 2] += vx.z;

        const limitX = 12;
        const limitY = 7;
        const limitZ = 7;

        if (Math.abs(positionsArray[i3]) > limitX) vx.x *= -0.96;
        if (Math.abs(positionsArray[i3 + 1]) > limitY) vx.y *= -0.96;
        if (Math.abs(positionsArray[i3 + 2]) > limitZ) vx.z *= -0.96;
      }

      if (!detectedRecently && app.trail.length) {
        app.trail = app.trail.slice(-Math.max(0, app.trail.length - 1));
        updateTrailLine();
      }

      particles.rotation.y += 0.0009;
      particles.rotation.x = Math.sin(elapsed * 0.18) * 0.08;
      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener("resize", onResize);

    animate();
    initCamera();
  </script>
</body>
</html>
